<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>趣味單字拼拼樂 - 雙人對戰版</title>
    <style>
        /* 基礎版面設定 */
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #f0f4f8;
            overflow: hidden; 
            font-family: '微軟正黑體', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.png'); 
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .header-title {
            position: absolute;
            top: 15px;
            left: 30px;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 10px 30px;
            border-radius: 40px;
            font-size: 26px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15);
            border: 4px solid #ffcc00;
            z-index: 20;
        }

        /* 遊戲全螢幕佈局 */
        .game-layout {
            display: flex;
            flex-direction: column; 
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: space-between;
            padding: 15px; 
            box-sizing: border-box;
        }

        /* 雙轉盤容器：橫向並列 */
        .wheels-container {
            display: flex;
            flex-direction: row;
            width: 100%;
            flex: 1;
            align-items: center;
            justify-content: space-evenly; 
            gap: 20px;
            margin-top: 60px; 
            min-height: 0;
        }

        .wheel-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            max-width: 50%;
        }

        .player-badge {
            background-color: #E91E63;
            color: white;
            padding: 8px 24px;
            border-radius: 20px;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            z-index: 10;
        }
        .player-badge.team2 { background-color: #2196F3; }

        .wheel-container {
            position: relative;
            display: inline-block; 
            max-width: 100%;
        }

        .base-layer {
            max-height: 70vh;
            max-width: 100%; 
            height: auto;
            display: block; 
            border-radius: 50%; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            transition: opacity 0.3s ease; 
        }

        .wheel-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none; 
        }

        .mid-wrapper { height: 73.5%; z-index: 2; }
        .top-wrapper { height: 45%; z-index: 3; } 
        .pointer-wrapper { height: 28%; z-index: 10; }

        /* 僅保留中層、上層可以拖曳操作 */
        #mid-layer-1, #top-layer-1, #mid-layer-2, #top-layer-2 {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
            pointer-events: auto; 
            cursor: grab;
            touch-action: none; 
            transform-origin: center center;
        }

        #mid-layer-1:active, #top-layer-1:active, #mid-layer-2:active, #top-layer-2:active {
            cursor: grabbing;
        }

        /* 鎖定雙方的指針圖層，僅供系統出題旋轉 */
        #pointer-layer-1, #pointer-layer-2 {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transform-origin: center center;
            pointer-events: none; 
        }

        /* 底部控制列 */
        .control-panel {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 30px;
            border-radius: 50px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: row; 
            align-items: center;
            justify-content: space-around;
            width: 95%;
            max-width: 1500px;
            flex-shrink: 0;
            z-index: 10;
            margin-bottom: 10px;
            gap: 20px;
        }

        .series-selector {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 15px;
        }

        .series-selector label { font-size: 20px; font-weight: bold; color: #333; white-space: nowrap; }

        .series-selector select {
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #ccc;
            border-radius: 12px;
            background-color: #fff;
            color: #333;
            cursor: pointer;
            outline: none;
            font-family: '微軟正黑體', sans-serif;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .btn-group { display: flex; flex-direction: row; gap: 15px; }
        
        button {
            padding: 10px 20px; 
            font-size: 18px; 
            font-weight: bold; 
            border: none;
            border-radius: 30px; 
            cursor: pointer; 
            transition: all 0.2s; 
            color: white;
            white-space: nowrap;
        }
        
        .btn-spin { background-color: #E91E63; }
        .btn-spin:hover { background-color: #C2185B; transform: scale(1.05); box-shadow: 0 4px 10px rgba(233, 30, 99, 0.4); }
        .btn-audio { background-color: #4CAF50; }
        .btn-audio:hover { background-color: #388E3C; transform: scale(1.05); }
        .btn-success { background-color: #FFC107; color: #333; }
        .btn-success:hover { background-color: #FFA000; transform: scale(1.05); }
        
        .scoreboard { display: flex; flex-direction: row; align-items: center; gap: 30px; }
        .team-score { display: flex; align-items: center; gap: 15px; font-size: 22px; font-weight: bold; color: #333; white-space: nowrap; }
        .score-controls { display: flex; gap: 8px; }
        .score-btn { padding: 6px 18px; font-size: 20px; border-radius: 12px; background-color: #2196F3; color: white; }
        .score-btn:hover { background-color: #0b7dda; }
        .divider { width: 2px; height: 40px; background-color: #ddd; }

        /* 響應式：平板直向與手機 */
        @media (max-width: 1100px) {
            .control-panel { flex-wrap: wrap; border-radius: 20px; padding: 15px; justify-content: center; }
            .divider { display: none; }
            .header-title { position: relative; top: auto; left: auto; margin: 10px auto 0 auto; text-align: center; }
            .wheels-container { margin-top: 10px; flex-direction: column; gap: 30px;} 
            .wheel-area { max-width: 90%; }
            .base-layer { max-height: 38vh; } 
        }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="header-title">趣味單字拼拼樂 ⚔️ 雙人對戰</div>

    <div class="game-layout">
        
        <div class="wheels-container">
            
            <div class="wheel-area">
                <div class="player-badge">第一組 P1</div>
                <div class="wheel-container">
                    <img src="base-WS1.jpg" class="base-layer" id="base-image-1" alt="底板1">
                    <div class="wheel-wrapper mid-wrapper">
                        <img src="mid.png" id="mid-layer-1" alt="中層">
                    </div>
                    <div class="wheel-wrapper top-wrapper">
                        <img src="top.png" id="top-layer-1" alt="上層">
                    </div>
                    <div class="wheel-wrapper pointer-wrapper">
                        <svg id="pointer-layer-1" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
                                    <feDropShadow dx="2" dy="6" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
                                </filter>
                            </defs>
                            <path d="M 100 15 L 125 100 L 100 120 L 75 100 Z" fill="#E91E63" stroke="#FFFFFF" stroke-width="4" filter="url(#shadow1)"/>
                            <circle cx="100" cy="100" r="20" fill="#333" filter="url(#shadow1)"/>
                            <circle cx="100" cy="100" r="10" fill="#FFEB3B"/>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="wheel-area">
                <div class="player-badge team2">第二組 P2</div>
                <div class="wheel-container">
                    <img src="base-WS1.jpg" class="base-layer" id="base-image-2" alt="底板2">
                    <div class="wheel-wrapper mid-wrapper">
                        <img src="mid.png" id="mid-layer-2" alt="中層">
                    </div>
                    <div class="wheel-wrapper top-wrapper">
                        <img src="top.png" id="top-layer-2" alt="上層">
                    </div>
                    <div class="wheel-wrapper pointer-wrapper">
                        <svg id="pointer-layer-2" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
                                    <feDropShadow dx="2" dy="6" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
                                </filter>
                            </defs>
                            <path d="M 100 15 L 125 100 L 100 120 L 75 100 Z" fill="#2196F3" stroke="#FFFFFF" stroke-width="4" filter="url(#shadow2)"/>
                            <circle cx="100" cy="100" r="20" fill="#333" filter="url(#shadow2)"/>
                            <circle cx="100" cy="100" r="10" fill="#FFEB3B"/>
                        </svg>
                    </div>
                </div>
            </div>

        </div>

        <div class="control-panel">
            <div class="series-selector">
                <label for="bg-selector">📚 教材</label>
                <select id="bg-selector" onchange="changeBaseImage()">
                    <option value="base-WS1.jpg">Wow Story - 一年級</option>
                    <option value="base-WS2.jpg">Wow Story - 二年級</option>
                    <option value="base-FW1.jpg">Fun World - 一年級</option>
                    <option value="base-FW2.jpg">Fun World - 二年級</option>
                </select>
            </div>

            <div class="divider"></div>

            <div class="btn-group">
                <button class="btn-spin" onclick="spinPointers()">🎲 雙方出題</button>
                <button class="btn-audio" onclick="toggleBGM()" id="bgm-btn">🎵 背景音樂</button>
                <button class="btn-success" onclick="playSuccess()">🎉 答對囉！</button>
            </div>
            
            <div class="divider"></div>
            
            <div class="scoreboard">
                <div class="team-score">
                    <span style="color:#E91E63;">第一組：<span id="score1">0</span> 分</span>
                    <div class="score-controls">
                        <button class="score-btn" style="background-color:#E91E63;" onclick="updateScore(1, 1)">+</button>
                        <button class="score-btn" style="background-color:#E91E63;" onclick="updateScore(1, -1)">-</button>
                    </div>
                </div>
                <div class="team-score">
                    <span style="color:#2196F3;">第二組：<span id="score2">0</span> 分</span>
                    <div class="score-controls">
                        <button class="score-btn" onclick="updateScore(2, 1)">+</button>
                        <button class="score-btn" onclick="updateScore(2, -1)">-</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="audio-spin" src="指針音效.m4a" preload="auto"></audio>
    <audio id="audio-bgm" src="背景音樂.m4a" loop preload="auto"></audio>
    <audio id="audio-win" src="勝利音效.m4a" preload="auto"></audio>

    <script>
        const sliceAngle = 360 / 26; 
        let isBgmPlaying = false;
        
        // 分別記錄兩組指針的旋轉角度
        let currentPointerRotation1 = 0;
        let currentPointerRotation2 = 0;

        function changeBaseImage() {
            const selector = document.getElementById('bg-selector');
            const baseImg1 = document.getElementById('base-image-1');
            const baseImg2 = document.getElementById('base-image-2');
            
            baseImg1.style.opacity = 0;
            baseImg2.style.opacity = 0;
            setTimeout(() => {
                baseImg1.src = selector.value;
                baseImg2.src = selector.value;
                baseImg1.style.opacity = 1;
                baseImg2.style.opacity = 1;
            }, 150);
        }

        const baseSpinSound = document.getElementById('audio-spin');
        function playTickSound() {
            const tick = baseSpinSound.cloneNode();
            tick.volume = 0.6; 
            tick.play().catch(e => console.log('等待互動'));
        }

        // --- 全新：系統雙重隨機出題 ---
        function spinPointers() {
            playTickSound();
            
            const pointer1 = document.getElementById('pointer-layer-1');
            const pointer2 = document.getElementById('pointer-layer-2');
            
            // 各自產生不同的隨機圈數與最終格數 (確保兩組題目不一樣)
            const randomRounds1 = (Math.floor(Math.random() * 4) + 3) * 360;
            const randomSlices1 = Math.floor(Math.random() * 26) * sliceAngle;
            
            const randomRounds2 = (Math.floor(Math.random() * 4) + 3) * 360;
            const randomSlices2 = Math.floor(Math.random() * 26) * sliceAngle;
            
            currentPointerRotation1 += (randomRounds1 + randomSlices1);
            currentPointerRotation2 += (randomRounds2 + randomSlices2);
            
            // 強制對齊 26 街區
            currentPointerRotation1 = Math.round(currentPointerRotation1 / sliceAngle) * sliceAngle;
            currentPointerRotation2 = Math.round(currentPointerRotation2 / sliceAngle) * sliceAngle;

            // 觸發物理旋轉動畫
            pointer1.style.transition = 'transform 4s cubic-bezier(0.1, 0.7, 0.1, 1)';
            pointer1.style.transform = `rotate(${currentPointerRotation1}deg)`;
            
            pointer2.style.transition = 'transform 4s cubic-bezier(0.1, 0.7, 0.1, 1)';
            pointer2.style.transform = `rotate(${currentPointerRotation2}deg)`;
        }

        // ==========================================
        // 多點獨立觸控拖曳邏輯
        // ==========================================
        function makeDraggable(elementId) {
            const element = document.getElementById(elementId);
            let isDragging = false;
            let currentRotation = 0; 
            let previousAngle = 0;   
            let lastSoundRotation = 0; 
            let activeTouchId = null; 

            function getAngle(clientX, clientY) {
                const rect = element.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const dx = clientX - centerX;
                const dy = clientY - centerY;
                return Math.atan2(dy, dx) * (180 / Math.PI);
            }

            function onDragStart(e) {
                e.preventDefault(); 
                isDragging = true;
                element.style.transition = 'none';

                let clientX, clientY;
                if (e.type === 'touchstart') {
                    const touch = e.changedTouches[0];
                    activeTouchId = touch.identifier;
                    clientX = touch.clientX;
                    clientY = touch.clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }
                
                previousAngle = getAngle(clientX, clientY);
            }

            function onDragMove(e) {
                if (!isDragging) return;
                e.preventDefault();

                let clientX, clientY;
                if (e.type === 'touchmove') {
                    let touch = null;
                    for (let i = 0; i < e.changedTouches.length; i++) {
                        if (e.changedTouches[i].identifier === activeTouchId) {
                            touch = e.changedTouches[i];
                            break;
                        }
                    }
                    if (!touch) return; 
                    clientX = touch.clientX;
                    clientY = touch.clientY;
                } else {
                    clientX = e.clientX;
                    clientY = e.clientY;
                }

                const currentMouseAngle = getAngle(clientX, clientY);
                let deltaAngle = currentMouseAngle - previousAngle;

                if (deltaAngle > 180) deltaAngle -= 360;
                if (deltaAngle < -180) deltaAngle += 360;

                currentRotation += deltaAngle;
                previousAngle = currentMouseAngle;

                element.style.transform = `rotate(${currentRotation}deg)`;

                if (Math.abs(currentRotation - lastSoundRotation) >= sliceAngle) {
                    playTickSound();
                    lastSoundRotation = currentRotation;
                }
            }

            function onDragEnd(e) {
                if (!isDragging) return;
                
                if (e.type === 'touchend' || e.type === 'touchcancel') {
                    let touchFound = false;
                    for (let i = 0; i < e.changedTouches.length; i++) {
                        if (e.changedTouches[i].identifier === activeTouchId) {
                            touchFound = true;
                            break;
                        }
                    }
                    if (!touchFound) return; 
                    activeTouchId = null; 
                }

                isDragging = false;
                element.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
                
                const snapRotation = Math.round(currentRotation / sliceAngle) * sliceAngle;
                currentRotation = snapRotation;
                lastSoundRotation = snapRotation;
                
                element.style.transform = `rotate(${currentRotation}deg)`;
            }

            element.addEventListener('mousedown', onDragStart);
            window.addEventListener('mousemove', onDragMove);
            window.addEventListener('mouseup', onDragEnd);
            element.addEventListener('touchstart', onDragStart, { passive: false });
            window.addEventListener('touchmove', onDragMove, { passive: false });
            window.addEventListener('touchend', onDragEnd);
            window.addEventListener('touchcancel', onDragEnd);
        }

        // 初始化中層、上層圖層可拖曳，排除指針圖層
        makeDraggable('mid-layer-1');
        makeDraggable('top-layer-1');
        makeDraggable('mid-layer-2');
        makeDraggable('top-layer-2');

        function toggleBGM() {
            const bgm = document.getElementById('audio-bgm');
            const btn = document.getElementById('bgm-btn');
            if (isBgmPlaying) {
                bgm.pause();
                btn.innerText = "🎵 背景音樂";
            } else {
                bgm.play().catch(e => console.log('請先點擊畫面任一處'));
                btn.innerText = "🔇 暫停音樂";
            }
            isBgmPlaying = !isBgmPlaying;
        }

        function playSuccess() {
            const winSound = document.getElementById('audio-win');
            winSound.currentTime = 0;
            winSound.play();
        }

        let scores = { 1: 0, 2: 0 };
        function updateScore(team, amount) {
            scores[team] += amount;
            if (scores[team] < 0) scores[team] = 0;
            document.getElementById(`score${team}`).innerText = scores[team];
        }
    </script>
</body>
</html>
